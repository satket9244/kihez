name: Aider GitHub Issue Bot

on:
  issues:
    types: [opened, edited]

jobs:
  aider:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Run Aider with Qwen
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENAI_API_BASE: https://integrate.api.nvidia.com/v1
          OPENAI_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          # 1. Összegyűjtjük a legfontosabb forrásfájlokat (Kotlin, Java, XML), hogy az AI lássa őket
          FILES_TO_EDIT=$(find . -name "*.kt" -o -name "*.java" -o -name "*.xml" | grep -v "/build/" | head -n 15 | tr '\n' ' ')
          
          echo "Az AI az alábbi fájlokat kapja meg alapként: $FILES_TO_EDIT"
          
          # 2. Elindítjuk az Aidert úgy, hogy a fájlokat már eleve betöltjük a chatbe
          aider --model openai/qwen/qwen3-coder-480b-a35b-instruct \
                --message "Itt egy feladat a projekthez: ${{ github.event.issue.body }}" \
                --yes \
                $FILES_TO_EDIT
                
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "AI módosítások: ${{ github.event.issue.title }}"
          title: "AI megoldás: ${{ github.event.issue.title }}"
          body: "Ez a PR automatikusan jött létre az NVIDIA Qwen-2.5-Coder segítségével a #${{ github.event.issue.number }} Issue alapján."
          branch: "aider-fix-${{ github.event.issue.number }}"
