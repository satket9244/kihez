name: Aider GitHub Issue Bot

on:
  issue_comment:
    types: [created]

jobs:
  aider:
    runs-on: ubuntu-latest
    # CSAK akkor indul el, ha a kommentet a GitHub Actions bot írta oda (azaz az okosító végzett)
    if: github.event.comment.user.login == 'github-actions[bot]'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Run Aider with Qwen
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENAI_API_BASE: https://integrate.api.nvidia.com/v1
          OPENAI_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        # Környezeti változóként adjuk át, így a bash nem próbálja meg parancsként értelmezni a szöveget!
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # 1. Összegyűjtjük a legfontosabb forrásfájlokat
          FILES_TO_EDIT=$(find . -name "*.kt" -o -name "*.java" -o -name "*.xml" | grep -v "/build/" | head -n 15 | tr '\n' ' ')
          
          echo "Az AI az alábbi fájlokat kapja meg alapként: $FILES_TO_EDIT"
          
          # 2. Elindítjuk az Aidert a biztonságos változóval
          aider --model openai/qwen/qwen3-coder-480b-a35b-instruct \
                --message "Itt egy feladat a projekthez: $ISSUE_BODY" \
                --yes \
                $FILES_TO_EDIT
                
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "AI módosítások: ${{ github.event.issue.title }}"
          title: "AI megoldás: ${{ github.event.issue.title }}"
          body: "Ez a PR automatikusan jött létre az NVIDIA Qwen-2.5-Coder segítségével a #${{ github.event.issue.number }} Issue alapján."
          branch: "aider-fix-${{ github.event.issue.number }}"
