name: AI Architect & Coder Team

on:
  issues:
    types: [opened]

jobs:
  ai_development_chain:
    runs-on: ubuntu-latest
    if: github.event.issue.user.type != 'Bot'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------------------------------------
      # 1. FÁZIS: AZ ISSUE OKOSÍTÁSA (A FORDÍTÓ AI)
      # -------------------------------------------------------------
      - name: Generate Repo Structure Summary
        run: |
          echo "=== PROJEKT FÁJLSZERKEZET ===" > repo_summary.txt
          find . -maxdepth 4 -name "*.kt" -o -name "*.xml" | grep -v "/build/" | head -n 30 >> repo_summary.txt
          echo "=== REPO STRUCT END ===" >> repo_summary.txt

      - name: Call Qwen to Enhance Issue
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          RAW_ISSUE_BODY: ${{ github.event.issue.body }}
          RAW_ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          STRUCT=$(cat repo_summary.txt)
          
          SYSTEM_PROMPT="You are an expert software architect. Your job is to translate a user's casual, simple request (often in Hungarian) into a highly professional, technical, English instruction set for an AI coding assistant (Aider).
          Structure your output exactly like this:
          ---
          ### 🛠 Professional Technical Specification
          [Detailed technical tasks, mention specific Android/Jetpack Compose components, states, or logic needed based on the request and repo structure]
          
          ### 📊 Current Project Context
          [Brief summary of the relevant file structure provided below]
          ---
          Here is the current repository structure:
          $STRUCT"

          USER_REQUEST="User Title: $RAW_ISSUE_TITLE\nUser Message: $RAW_ISSUE_BODY"

          cat << 'EOF' > call_api.py
          import os, json, urllib.request

          api_key = os.environ['NVIDIA_API_KEY']
          base_url = "https://integrate.api.nvidia.com/v1/chat/completions"
          
          headers = {
              "Authorization": f"Bearer {api_key}",
              "Content-Type": "application/json"
          }

          data = {
              "model": "qwen/qwen3-coder-480b-a35b-instruct",
              "messages": [
                  {"role": "system", "content": os.getenv('SYSTEM_PROMPT_VAL', '')},
                  {"role": "user", "content": os.getenv('USER_REQUEST_VAL', '')}
              ],
              "temperature": 0.2
          }

          req = urllib.request.Request(base_url, data=json.dumps(data).encode('utf-8'), headers=headers)
          try:
              with urllib.request.urlopen(req) as response:
                  res = json.loads(response.read().decode('utf-8'))
                  enhanced_text = res['choices'][0]['message']['content']
                  with open("enhanced_issue.txt", "w") as f:
                      f.write(enhanced_text)
          except Exception as e:
              print(f"Error: {e}")
              exit(1)
          EOF

          export SYSTEM_PROMPT_VAL="$SYSTEM_PROMPT"
          export USER_REQUEST_VAL="$USER_REQUEST"
          python3 call_api.py

      - name: Update Issue with Professional Prompt
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const enhancedBody = fs.readFileSync('enhanced_issue.txt', 'utf8');
            
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `_Eredeti felhasználói kérés:_\n> ${context.payload.issue.body}\n\n${enhancedBody}`
            });

      # -------------------------------------------------------------
      # 2. FÁZIS: AZ INTERAKTÍV KÓDOLÁS (AIDER BOT)
      # -------------------------------------------------------------
      - name: Setup Python for Aider
        uses: actions/setup-python@v5
        with:
          python-python: '3.11'

      - name: Install Aider
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Run Aider with Enhanced Prompt
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENAI_API_BASE: https://integrate.api.nvidia.com/v1
          OPENAI_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          # Beolvassuk a friss, lefordított specifikációt, amit az előző lépés elmentett
          ENHANCED_PROMPT=$(cat enhanced_issue.txt)
          
          # Összegyűjtjük a forrásfájlokat
          FILES_TO_EDIT=$(find . -name "*.kt" -o -name "*.java" -o -name "*.xml" | grep -v "/build/" | head -n 15 | tr '\n' ' ')
          
          export ISSUE_BODY="$ENHANCED_PROMPT"
          
          # Elindítjuk az Aidert
          aider --model openai/qwen/qwen3-coder-480b-a35b-instruct \
                --message "Itt a feladat részletes leírása: $ISSUE_BODY" \
                --yes \
                $FILES_TO_EDIT
